spring.application.name=myfoodload-backend

# ── DB ────────────────────────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/myfoodload}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP 커넥션 풀 ──────────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=25
spring.datasource.hikari.minimum-idle=8
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# validate: Flyway가 먼저 스키마를 생성하고, Hibernate가 엔티티와 일치 여부 검증
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# Hibernate 6에서 dialect 자동 감지 (구 PostgisPG10Dialect 삭제)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── 서버 ──────────────────────────────────────────────────────────────────────
server.port=8080
# 에러 응답에 스택 트레이스·메시지 노출 차단 (프로덕션 보안)
server.error.include-stacktrace=never
server.error.include-message=never
# LLM 분석 등 장시간 비동기 요청 타임아웃 (기본 30s → 120s)
spring.mvc.async.request-timeout=120000

# ── Google OAuth ──────────────────────────────────────────────────────────────
# 환경변수 GOOGLE_CLIENT_ID 필수 — 미설정 시 Google OAuth 실패
google.client-id=${GOOGLE_CLIENT_ID}

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000

# ── Gemini ────────────────────────────────────────────────────────────────────
# IntelliJ Run Config에 GEMINI_API_KEY 환경변수 설정 필요
gemini.api-key=${GEMINI_API_KEY:}

# ── YouTube ───────────────────────────────────────────────────────────────────
# YouTube Data API v3 사용 시 OAuth access token을 Android에서 전달받아 사용.
# API 호출 한도: 하루 10,000 유닛 (공유 분석 캐시로 절약)
youtube.max-videos-per-user=50
# 폴백 추천용 서버 사이드 YouTube Data API 키 (search.list 엔드포인트)
# Google Cloud Console → YouTube Data API v3 → API 키 (서버 애플리케이션용)
# IntelliJ Run Config에 YOUTUBE_DATA_API_KEY 환경변수 설정 필요
youtube.data-api-key=${YOUTUBE_DATA_API_KEY:}

# ── Kakao Local API ────────────────────────────────────────────────────────────
# IntelliJ Run Config에 KAKAO_API_KEY 환경변수 설정 필요
kakao.api-key=${KAKAO_API_KEY:}

# ── CORS ────────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://api.myfoodload.shop}
