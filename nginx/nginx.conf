server {
    listen 80;
    server_name api.myfoodload.shop;

    # Let's Encrypt 인증용 (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지는 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.myfoodload.shop;

    ssl_certificate /etc/letsencrypt/live/api.myfoodload.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.myfoodload.shop/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 프록시 설정
    location / {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 타임아웃 (LLM 분석 등 긴 요청 대비)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
