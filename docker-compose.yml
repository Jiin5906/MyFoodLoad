services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: myfoodload-postgres
    environment:
      POSTGRES_DB: myfoodload
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - myfoodload_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myfoodload"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  myfoodload_pgdata:
